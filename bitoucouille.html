<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitou ou Couille - Tinder Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tinder-pink: #fe3c72; --tinder-orange: #ff7854; --bg-dark: #111418; --card-bg: #24282c; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: #181b1f; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 100; }
        nav div { color: #888; cursor: pointer; font-size: 24px; transition: 0.3s; }
        nav div.active { color: var(--tinder-pink); }

        .page { display: none; height: calc(100vh - 70px); padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .page.active { display: block; }

        .card-wrapper { position: relative; width: 100%; max-width: 350px; height: 450px; margin: 10px auto; perspective: 1000px; }
        .carte { width: 100%; height: 100%; background: var(--card-bg); border-radius: 15px; overflow: hidden; position: absolute; box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: grab; transition: transform 0.3s ease-out; }
        .carte.dragging { transition: none; cursor: grabbing; }
        .carte img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .card-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); box-sizing: border-box; pointer-events: none; }

        .streak-container { font-size: 28px; color: #ff9800; font-weight: bold; height: 40px; display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 5px; }
        .streak-fire { animation: pulse 0.5s infinite alternate; display: inline-block; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.3); } }

        .stats-bar { font-size: 11px; color: #666; margin-bottom: 10px; text-align: center; }

        #upload-zone { background: var(--card-bg); padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        input, select, button { width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        input, select { background: #333; color: white; }
        .btn-main { background: linear-gradient(45deg, var(--tinder-pink), var(--tinder-orange)); color: white; font-weight: bold; cursor: pointer; }

        .game-buttons { display: flex; justify-content: center; gap: 30px; margin-top: 10px; }
        .round-btn { width: 75px; height: 75px; border-radius: 50%; border: 4px solid; display: flex; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; background: transparent; transition: 0.2s; user-select: none; }
        .btn-bitou { color: #ffe135; border-color: #ffe135; }
        .btn-couille { color: #b5e61d; border-color: #b5e61d; }

        /* Écran de fin */
        .end-screen { background: var(--card-bg); border-radius: 15px; padding: 30px; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .final-score { font-size: 50px; font-weight: bold; color: var(--tinder-pink); margin: 10px 0; }
    </style>
</head>
<body>

    <div id="page-jouer" class="page active">
        <div class="stats-bar">
            <span id="total-photos">0</span> photos | <span id="total-visitors">0</span> connections au site
        </div>
        
        <div class="streak-container" id="streak-ui"></div>

        <div class="card-wrapper" id="game-view">
            <p style="text-align: center;">Chargement des profils...</p>
        </div>

        <div id="controls" class="game-buttons">
            <div class="round-btn btn-bitou" onclick="handleBtn('gauche')">🍌</div>
            <div class="round-btn btn-couille" onclick="handleBtn('droite')">🥝</div>
        </div>
    </div>

    <div id="page-ajouter" class="page">
        <h1 style="text-align: center;">Nouvelle Photo</h1>
        <div id="upload-zone">
            <input type="text" id="p-nom" placeholder="Nom de la photo">
            <select id="p-reponse">
                <option value="gauche">C'est une Bite (🍌)</option>
                <option value="droite">C'est une Couille (🥝)</option>
            </select>
            <input type="file" id="p-file" accept="image/*">
            <button class="btn-main" id="btn-upload">PUBLIER SUR BITOUCOUILLE</button>
        </div>
    </div>

    <nav>
        <div onclick="switchPage('jouer')" id="nav-jouer" class="active"><i class="fas fa-fire"></i></div>
        <div onclick="switchPage('ajouter')" id="nav-ajouter"><i class="fas fa-plus-circle"></i></div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, setDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAsDwFwemar9UEhXBjVRIDpg2qVqpWFPQE",
            authDomain: "jingerdwarf-4e6e7.firebaseapp.com",
            projectId: "jingerdwarf-4e6e7",
            storageBucket: "jingerdwarf-4e6e7.firebasestorage.app",
            messagingSenderId: "795629210788",
            appId: "1:795629210788:web:788099a4510677fee06a31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "profils");

        let profils = [];
        let currentIndex = 0;
        let streak = 0;
        let maxStreak = 0;
        let scoreTotal = 0;

        window.switchPage = (page) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            document.getElementById('nav-' + page).classList.add('active');
        };

        async function updateStats() {
            const visitorDoc = doc(db, "stats", "global");
            await setDoc(visitorDoc, { count: increment(1) }, { merge: true });
            const snap = await getDoc(visitorDoc);
            if(snap.exists()) document.getElementById('total-visitors').innerText = snap.data().count;
        }

        async function init() {
            updateStats();
            const snap = await getDocs(colRef);
            snap.forEach(d => profils.push(d.data()));
            profils = profils.sort(() => Math.random() - 0.5);
            document.getElementById('total-photos').innerText = profils.length;
            renderCard();
        }

        function renderCard() {
            const view = document.getElementById('game-view');
            const controls = document.getElementById('controls');
            
            if (currentIndex >= profils.length) {
                controls.style.display = 'none';
                let message = scoreTotal > profils.length / 2 ? "Pas mal l'expert ! 🍌" : "Tu confonds tout... 🥝";
                if(scoreTotal === profils.length) message = "SCORE PARFAIT ! 🔥";

                view.innerHTML = `
                    <div class="end-screen">
                        <h2>SESSION TERMINÉE</h2>
                        <div class="final-score">${scoreTotal} / ${profils.length}</div>
                        <p>${message}</p>
                        <p style="margin-top:10px; color:#888;">Meilleure série : ${maxStreak} 🔥</p>
                        <button class="btn-main" style="margin-top:20px;" onclick="location.reload()">REJOUER</button>
                    </div>`;
                return;
            }

            const p = profils[currentIndex];
            const card = document.createElement('div');
            card.className = 'carte';
            card.id = 'active-card';
            card.innerHTML = `<img src="${p.image}"><div class="card-info"><h2>${p.nom}</h2></div>`;
            
            view.innerHTML = '';
            view.appendChild(card);
            setupSwipe(card);
        }

        function setupSwipe(card) {
            let startX = 0; let currentX = 0; let isDragging = false;
            const start = (e) => { isDragging = true; startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX; card.classList.add('dragging'); };
            const move = (e) => { if (!isDragging) return; currentX = (e.type.includes('mouse') ? e.pageX : e.touches[0].clientX) - startX; card.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.05}deg)`; };
            const end = () => { if (!isDragging) return; isDragging = false; card.classList.remove('dragging');
                if (currentX > 120) valider('droite'); else if (currentX < -120) valider('gauche'); else card.style.transform = '';
            };
            card.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
            card.addEventListener('touchstart', start); window.addEventListener('touchmove', move); window.addEventListener('touchend', end);
        }

        window.handleBtn = (dir) => valider(dir);

        window.valider = (choix) => {
            const reponseCorrecte = profils[currentIndex].reponse;
            const streakUI = document.getElementById('streak-ui');
            const card = document.getElementById('active-card');

            if (card) { card.style.transform = choix === 'droite' ? 'translateX(1000px) rotate(50deg)' : 'translateX(-1000px) rotate(-50deg)'; }

            if (choix === reponseCorrecte) {
                scoreTotal++;
                streak++;
                if(streak > maxStreak) maxStreak = streak;
                streakUI.innerHTML = streak >= 3 ? `<span class="streak-fire">🔥</span> ${streak} STREAK !` : "✅";
            } else {
                streak = 0;
                streakUI.innerHTML = "❌";
            }
            
            currentIndex++;
            setTimeout(() => { streakUI.innerHTML = streak >= 3 ? `<span class="streak-fire">🔥</span> ${streak}` : ""; renderCard(); }, 500);
        };

        document.getElementById('btn-upload').onclick = async () => {
            const btn = document.getElementById('btn-upload');
            const file = document.getElementById('p-file').files[0];
            const nom = document.getElementById('p-nom').value;
            const reponse = document.getElementById('p-reponse').value;
            if(!file || !nom) return alert("Nom et image obligatoires !");
            btn.innerText = "COMPRESSION..."; btn.disabled = true;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image(); img.src = event.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas'); const MAX_WIDTH = 800; let width = img.width; let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    const compressedData = canvas.toDataURL('image/jpeg', 0.7);
                    try { await addDoc(colRef, { nom, reponse, image: compressedData, date: Date.now() }); alert("Publié !"); location.reload(); } catch (e) { alert("Erreur !"); btn.innerText = "PUBLIER"; btn.disabled = false; }
                };
            };
        };

        init();
    </script>
</body>
</html>
